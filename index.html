<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Naveen Kumar Ramisetty — Enterprise Integration & Data Analyst building with AI">
  <meta name="color-scheme" content="dark">
  <title>Naveen Kumar Ramisetty</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="resume-dash.css">
</head>
<body>
  <header class="dash-header" id="dash-header">
    <div class="header-inner">
      <div class="header-main">
        <button type="button" id="profile-photo_btn" class="header-photo-btn" hidden aria-label="View profile photo">
          <img id="profile-photo" class="header-photo" alt="" width="56" height="56">
        </button>
        <div>
          <h1 id="profile-name">Loading…</h1>
          <p class="headline" id="profile-headline"></p>
        </div>
      </div>
      <div class="header-contact">
        <div id="profile-contact"></div>
        <div id="profile-links"></div>
      </div>
    </div>
  </header>

  <nav class="dash-nav" id="dash-nav" aria-label="Dashboard navigation"></nav>

  <main class="dash-main" id="dash-main">
    <p class="loading">Loading resume data…</p>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Naveen Kumar Ramisetty</p>
  </footer>

  <script src="resume-dash.js"></script>
</body>
</html>
